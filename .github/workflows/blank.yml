name: Update Android SDK

on:
  workflow_dispatch: 

jobs:
  update-android-sdk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
      
      - name: Set up JDK 11
        uses: actions/setup-java@v3
        with:
          java-version: '11'

      - name: Download and extract Android SDK Command-line Tools
        run: |
          curl -o cmdline-tools.zip https://dl.google.com/android/repository/commandlinetools-linux-10406996_latest.zip
          mkdir -p $RUNNER_TEMP/android-sdk
          unzip -q -d $RUNNER_TEMP/android-sdk cmdline-tools.zip
          mv $RUNNER_TEMP/android-sdk/cmdline-tools $ANDROID_SDK_ROOT

      - name: Accept Android SDK licenses
        run: $ANDROID_SDK_ROOT/tools/bin/sdkmanager --licenses
